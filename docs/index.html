<!doctype html>
<html lang="en" class="h-full scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deck documentation</title>
  <meta name="description" content="Documentation for the deck/deck Laravel package — installation, usage, production checklist, configuration reference, and Deck Cloud.">
  <meta property="og:title" content="Deck documentation">
  <meta property="og:description" content="Install Deck in three commands and get a durable, searchable log of every queue job.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Cpath d='M8 10.5h15' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M8 16h11' stroke='white' stroke-width='2' stroke-linecap='round' opacity='.92'/%3E%3Cpath d='M8 21.5h7' stroke='white' stroke-width='2' stroke-linecap='round' opacity='.84'/%3E%3Ccircle cx='22.5' cy='21.5' r='3' fill='white'/%3E%3Ccircle cx='22.5' cy='21.5' r='1.25' fill='%234f46e5'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter Tight", "ui-sans-serif", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
          },
        },
      },
    };
  </script>

  <style>
    html { font-feature-settings: "ss01","cv01","cv11"; }
    body {
      font-family: "Inter Tight", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .font-mono, code, pre, kbd { font-family: "JetBrains Mono", ui-monospace, monospace; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body class="antialiased bg-white text-zinc-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useContext, createContext } = React;

    // ──────────────────────────────────────── icons ──────────────
    const IC = {
      check:  "M4.5 12.75l6 6 9-13.5",
      copy:   "M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184",
      shield: "M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z",
      github: "M12 2C6.475 2 2 6.475 2 12c0 4.425 2.864 8.183 6.839 9.504.5.092.682-.217.682-.482v-1.689c-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855v2.748c0 .268.18.578.688.481A10.02 10.02 0 0022 12c0-5.525-4.475-10-10-10z",
    };

    function Icon({ d, size = 16, className = "", strokeWidth = 1.75 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} className={className} aria-hidden="true">
          <path strokeLinecap="round" strokeLinejoin="round" d={d} />
        </svg>
      );
    }

    // ──────────────────────────────────────── logo ───────────────
    function Logo({ size = "md", variant = "light", showLabel = true }) {
      const s = { sm: { mark: 30, text: "text-[15px]" }, md: { mark: 36, text: "text-[16px]" } }[size] || {};
      const dark = variant === "dark";
      const gradId = `lg-${variant}-${size}`;
      const hiId = `lh-${variant}-${size}`;
      return (
        <div className="flex items-center gap-2.5">
          <svg width={s.mark} height={s.mark} viewBox="0 0 40 40" aria-hidden="true" className="shrink-0">
            <defs>
              <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={dark ? "#7c83f7" : "#6366f1"} />
                <stop offset="100%" stopColor={dark ? "#4f46e5" : "#4338ca"} />
              </linearGradient>
              <linearGradient id={hiId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="rgba(255,255,255,0.18)" />
                <stop offset="55%" stopColor="rgba(255,255,255,0)" />
              </linearGradient>
            </defs>
            <rect x="6" y="11" width="22" height="22" rx="4" fill={`url(#${gradId})`} opacity="0.35"/>
            <rect x="9" y="9" width="22" height="22" rx="4" fill={`url(#${gradId})`} opacity="0.6"/>
            <rect x="12" y="7" width="22" height="22" rx="4" fill={`url(#${gradId})`}/>
            <rect x="12" y="7" width="22" height="22" rx="4" fill={`url(#${hiId})`}/>
            <circle cx="27" cy="21" r="3.2" fill="white"/>
            <circle cx="27" cy="21" r="1.4" fill={dark ? "#4f46e5" : "#4338ca"}/>
            <path d="M16 13h7" stroke="white" strokeWidth="1.6" strokeLinecap="round" opacity="0.92"/>
            <path d="M16 17h11" stroke="white" strokeWidth="1.6" strokeLinecap="round" opacity="0.7"/>
          </svg>
          {showLabel && (
            <div className="leading-none">
              <p className={`${s.text} font-semibold tracking-[-0.025em] ${dark ? "text-white" : "text-zinc-950"}`}>Deck</p>
              <p className={`mt-0.5 font-mono text-[9.5px] font-semibold uppercase tracking-[0.14em] ${dark ? "text-indigo-300/80" : "text-indigo-600/80"}`}>Queue control plane</p>
            </div>
          )}
        </div>
      );
    }

    // ──────────────────────────────────────── routing ────────────
    const DOCS_SECTIONS = [
      { label: 'Start here', pages: [
        { id: 'getting-started', label: 'Getting Started' },
        { id: 'horizon', label: 'Horizon & Deck' },
      ]},
      { label: 'Using Deck', pages: [
        { id: 'usage', label: 'Usage' },
        { id: 'production', label: 'Production' },
        { id: 'configuration', label: 'Configuration' },
      ]},
      { label: 'Cloud', pages: [
        { id: 'deck-cloud', label: 'Deck Cloud' },
      ]},
    ];
    const DOCS_FLAT = DOCS_SECTIONS.flatMap(s => s.pages);

    function getPageFromPath() {
      const match = window.location.pathname.match(/^\/docs\/([^/]+)/);
      const id = match ? match[1] : null;
      return (id && DOCS_FLAT.find(p => p.id === id)) ? id : 'getting-started';
    }

    const NavCtx = createContext(() => {});

    function useDocsRouter() {
      const [page, setPage] = useState(() => {
        const stored = sessionStorage.getItem('docsPage');
        if (stored && DOCS_FLAT.find(p => p.id === stored)) {
          sessionStorage.removeItem('docsPage');
          history.replaceState(null, '', `/docs/${stored}`);
          return stored;
        }
        return getPageFromPath();
      });

      useEffect(() => {
        const fn = () => { setPage(getPageFromPath()); window.scrollTo(0, 0); };
        window.addEventListener('popstate', fn);
        return () => window.removeEventListener('popstate', fn);
      }, []);

      const navigate = (id) => {
        history.pushState(null, '', `/docs/${id}`);
        setPage(id);
        window.scrollTo(0, 0);
      };

      return [page, navigate];
    }

    // ──────────────────────────────────────── nav ────────────────
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 8);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      const navigate = useContext(NavCtx);
      return (
        <header className={`sticky top-0 z-40 transition ${scrolled ? "border-zinc-200/60 bg-white/80 backdrop-blur-md" : "border-transparent bg-white"} border-b`}>
          <div className="mx-auto flex max-w-[1200px] items-center justify-between gap-6 px-6 py-3.5">
            <a href="/" className="rounded-lg focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
              <Logo size="sm" />
            </a>
            <nav className="hidden items-center gap-5 text-[13.5px] font-medium text-zinc-500 lg:flex">
              <span className="font-semibold text-zinc-900">Documentation</span>
              <span className="text-zinc-300">|</span>
              <a href="/" className="hover:text-zinc-900 transition-colors">← deckapp.cloud</a>
            </nav>
            <div className="flex items-center gap-2">
              <a href="https://github.com/getdeckapp/deck" target="_blank" rel="noopener" className="inline-flex items-center gap-1.5 rounded-lg px-2.5 py-1.5 text-[13px] font-medium text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900">
                <Icon d={IC.github} size={14} strokeWidth={0} className="fill-current"/>
                <span className="hidden sm:inline">GitHub</span>
              </a>
              <a href="/#waitlist" className="inline-flex items-center gap-1.5 rounded-lg bg-zinc-900 px-3 py-1.5 text-[13px] font-semibold text-white shadow-[0_1px_0_rgba(255,255,255,0.18)_inset,0_1px_2px_rgba(15,23,42,0.20)] hover:bg-zinc-800">
                Join waitlist
                <span className="opacity-60">→</span>
              </a>
            </div>
          </div>
        </header>
      );
    }

    // ──────────────────────────────────────── docs ui ────────────
    function DocH1({ children }) {
      return <h1 className="text-[30px] font-semibold tracking-[-0.025em] text-zinc-950 leading-tight">{children}</h1>;
    }
    function DocH2({ id, children }) {
      return (
        <h2 id={id} className="mt-10 mb-4 text-[19px] font-semibold tracking-[-0.015em] text-zinc-900 scroll-mt-20 border-b border-zinc-100 pb-2.5 pt-1">
          {children}
        </h2>
      );
    }
    function DocH3({ children }) {
      return <h3 className="mt-7 mb-3 text-[15px] font-semibold text-zinc-900">{children}</h3>;
    }
    function DocP({ children }) {
      return <p className="my-3.5 text-[15px] leading-[1.75] text-zinc-600">{children}</p>;
    }
    function DocNote({ children }) {
      return (
        <div className="my-5 flex gap-3 rounded-xl border border-indigo-200/70 bg-indigo-50/60 px-4 py-3.5">
          <svg className="mt-0.5 shrink-0 text-indigo-500" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
          </svg>
          <p className="text-[13.5px] leading-[1.65] text-indigo-900">{children}</p>
        </div>
      );
    }
    function DocWarn({ children }) {
      return (
        <div className="my-5 flex gap-3 rounded-xl border border-amber-200/70 bg-amber-50/60 px-4 py-3.5">
          <svg className="mt-0.5 shrink-0 text-amber-500" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <p className="text-[13.5px] leading-[1.65] text-amber-900">{children}</p>
        </div>
      );
    }
    function C({ children }) {
      return <code className="rounded-md bg-zinc-100 px-1.5 py-0.5 font-mono text-[12px] text-zinc-800 ring-1 ring-inset ring-zinc-200/60">{children}</code>;
    }
    function DocLink({ to, children }) {
      const navigate = useContext(NavCtx);
      return (
        <a href={`/docs/${to}`} onClick={e => { e.preventDefault(); navigate(to); }} className="text-indigo-600 hover:underline">
          {children}
        </a>
      );
    }
    function DocCb({ title, children }) {
      const [copied, setCopied] = useState(false);
      const copy = () => {
        const text = typeof children === 'string' ? children.trim() : '';
        navigator.clipboard?.writeText(text).then(() => {
          setCopied(true); setTimeout(() => setCopied(false), 1800);
        });
      };
      return (
        <div className="my-5 overflow-hidden rounded-xl border border-zinc-800 bg-[#09090b]">
          <div className="flex items-center justify-between border-b border-white/[0.06] bg-zinc-900/60 px-4 py-2">
            <span className="font-mono text-[11px] text-zinc-500">{title || ' '}</span>
            <button onClick={copy} className="text-zinc-500 hover:text-zinc-300 transition-colors" aria-label="Copy code">
              {copied ? <Icon d={IC.check} size={13} className="text-emerald-500"/> : <Icon d={IC.copy} size={13}/>}
            </button>
          </div>
          <pre className="overflow-x-auto p-5 font-mono text-[13px] leading-[1.75] text-zinc-300"><code>{typeof children === 'string' ? children.trim() : children}</code></pre>
        </div>
      );
    }
    function DocTable({ headers, rows }) {
      return (
        <div className="my-5 overflow-x-auto rounded-xl border border-zinc-200/80">
          <table className="w-full text-[13.5px]">
            <thead>
              <tr className="border-b border-zinc-200 bg-zinc-50">
                {headers.map((h, i) => <th key={i} className="px-4 py-3 text-left font-semibold text-zinc-700 whitespace-nowrap">{h}</th>)}
              </tr>
            </thead>
            <tbody className="divide-y divide-zinc-100">
              {rows.map((row, i) => (
                <tr key={i} className="hover:bg-zinc-50/60">
                  {row.map((cell, j) => <td key={j} className="px-4 py-2.5 text-zinc-600 align-top">{cell}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }
    function DocNavFooter({ page }) {
      const navigate = useContext(NavCtx);
      const idx = DOCS_FLAT.findIndex(p => p.id === page);
      const prev = idx > 0 ? DOCS_FLAT[idx - 1] : null;
      const next = idx < DOCS_FLAT.length - 1 ? DOCS_FLAT[idx + 1] : null;
      const navLink = (p, label, align) => (
        <a
          href={`/docs/${p.id}`}
          onClick={e => { e.preventDefault(); navigate(p.id); }}
          className={`group flex flex-col gap-1 rounded-xl border border-zinc-200 bg-white px-5 py-4 text-[13px] shadow-[0_1px_2px_rgba(15,23,42,0.04)] hover:border-indigo-200 hover:bg-indigo-50/30 transition-colors max-w-[200px] ${align === 'right' ? 'text-right ml-auto' : ''}`}
        >
          <span className="font-mono text-[10px] uppercase tracking-[0.1em] text-zinc-400 group-hover:text-indigo-500">{label}</span>
          <span className="font-semibold text-zinc-800 group-hover:text-indigo-700">{p.label}</span>
        </a>
      );
      return (
        <div className="mt-14 flex items-center justify-between gap-4 border-t border-zinc-200 pt-8">
          {prev ? navLink(prev, '← Previous', 'left') : <div/>}
          {next ? navLink(next, 'Next →', 'right') : <div/>}
        </div>
      );
    }

    // ──────────────────────────────────────── sidebar ────────────
    function DocsSidebar({ page }) {
      const navigate = useContext(NavCtx);
      return (
        <aside className="hidden lg:block w-56 shrink-0">
          <div className="sticky top-[72px] max-h-[calc(100vh-80px)] overflow-y-auto pb-8">
            <a href="/docs/" onClick={e => { e.preventDefault(); navigate('getting-started'); }} className="mb-5 flex items-center gap-2 text-[13px] font-semibold text-zinc-900">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-600" aria-hidden="true">
                <path d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/>
              </svg>
              Documentation
            </a>
            {DOCS_SECTIONS.map(sec => (
              <div key={sec.label} className="mb-6">
                <p className="mb-1.5 px-2 font-mono text-[9.5px] font-semibold uppercase tracking-[0.14em] text-zinc-400">{sec.label}</p>
                <ul className="space-y-0.5">
                  {sec.pages.map(p => (
                    <li key={p.id}>
                      <a
                        href={`/docs/${p.id}`}
                        onClick={e => { e.preventDefault(); navigate(p.id); }}
                        className={`flex items-center rounded-lg px-2 py-1.5 text-[13.5px] transition-colors ${page === p.id ? 'bg-indigo-50 font-medium text-indigo-700 ring-1 ring-inset ring-indigo-200/50' : 'text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900'}`}
                      >{p.label}</a>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </aside>
      );
    }
    function DocsMobileNav({ page }) {
      const navigate = useContext(NavCtx);
      return (
        <div className="lg:hidden mb-6 -mx-6 px-6 overflow-x-auto border-b border-zinc-200 pb-4">
          <div className="flex gap-2">
            {DOCS_FLAT.map(p => (
              <a key={p.id} href={`/docs/${p.id}`}
                onClick={e => { e.preventDefault(); navigate(p.id); }}
                className={`shrink-0 rounded-full px-3 py-1.5 text-[12.5px] font-medium transition-colors ${page === p.id ? 'bg-indigo-600 text-white' : 'bg-zinc-100 text-zinc-600 hover:bg-zinc-200'}`}>
                {p.label}
              </a>
            ))}
          </div>
        </div>
      );
    }

    function NextStepsGrid() {
      const navigate = useContext(NavCtx);
      const links = [
        { to: 'usage', title: 'Usage', desc: 'Dashboard routes, cancel, block, retry, progress' },
        { to: 'production', title: 'Production', desc: 'Retention, Redis, security, and scaling checklist' },
        { to: 'configuration', title: 'Configuration', desc: 'All environment variables and config keys' },
        { to: 'deck-cloud', title: 'Deck Cloud', desc: 'One pane of glass across every app' },
      ];
      return (
        <div className="my-5 grid gap-3 sm:grid-cols-2">
          {links.map(link => (
            <a key={link.to} href={`/docs/${link.to}`} onClick={e => { e.preventDefault(); navigate(link.to); }} className="group flex flex-col gap-1 rounded-xl border border-zinc-200 bg-white p-4 shadow-[0_1px_2px_rgba(15,23,42,0.04)] hover:border-indigo-200 hover:bg-indigo-50/30 transition-colors">
              <span className="text-[14px] font-semibold text-zinc-900 group-hover:text-indigo-700 transition-colors">{link.title} <span className="opacity-50">→</span></span>
              <span className="text-[13px] leading-snug text-zinc-500">{link.desc}</span>
            </a>
          ))}
        </div>
      );
    }

    // ──────────────────────────────────────── page: getting-started
    function DocsGettingStarted() {
      return (
        <article className="max-w-[720px]">
          <p className="mb-2 font-mono text-[11px] font-semibold uppercase tracking-[0.14em] text-indigo-600">Getting Started</p>
          <DocH1>Install Deck in three commands</DocH1>
          <DocP>Deck listens to Laravel queue events and records every dispatch, completion, and failure into a durable database log. The dashboard is live at <C>/deck</C> after three commands — no code changes required for basic recording.</DocP>

          <DocH2 id="requirements">Requirements</DocH2>
          <DocTable
            headers={["Requirement", "Notes"]}
            rows={[
              [<C>PHP 8.3+</C>, ""],
              ["Laravel 11, 12, or 13", ""],
              ["Laravel Horizon 5.x", <span>Recommended. Unlocks workload snapshots, failed-job retry, and unprocessed-queue detection. <DocLink to="horizon">More →</DocLink></span>],
              ["Database", "For Deck's execution log — your app DB or a dedicated one"],
              ["Redis", "For queues and cancel/block flags — typically the same instance as Horizon"],
            ]}
          />

          <DocH2 id="install">Install</DocH2>
          <DocCb title="bash">{`composer require deck/deck
php artisan deck:install
php artisan migrate`}</DocCb>
          <DocP><C>deck:install</C> publishes <C>config/deck.php</C>, migrations, and precompiled CSS to <C>public/vendor/deck</C>. Open <C>/deck</C> in your browser — the dashboard is ready immediately.</DocP>

          <DocH3>Dedicated database</DocH3>
          <DocP>Deck writes a row on every job event. On busy queues, use a separate connection to isolate load — see <DocLink to="production">Production → Dedicated database</DocLink>.</DocP>

          <DocH3>Horizon authorization</DocH3>

    // ──────────────────────────────────────── page: usage ────────
    function DocsUsage() {
      return (
        <article className="max-w-[720px]">
          <p className="mb-2 font-mono text-[11px] font-semibold uppercase tracking-[0.14em] text-indigo-600">Usage</p>
          <DocH1>Using the dashboard</DocH1>
          <DocP>After installation, Deck listens to queue events and records starts, completions, and failures automatically. No code changes required for basic history.</DocP>

          <DocH2 id="routes">Dashboard routes</DocH2>
          <DocTable
            headers={["Route", "Purpose"]}
            rows={[
              [<C>/deck</C>, "Overview, charts, recent failures, queue health"],
              [<C>/deck/classes</C>, "Per-class stats and history"],
              [<C>/deck/activity</C>, "Searchable execution log"],
              [<C>/deck/workers</C>, "Horizon snapshot and unprocessed queues"],
            ]}
          />
          <DocP>The prefix is configurable via <C>deck.route_prefix</C> in <C>config/deck.php</C>.</DocP>

          <DocH2 id="cancel">Cooperative cancellation</DocH2>
          <DocP>Add the <C>Cancellable</C> middleware and call <C>throwIfCancelled()</C> at checkpoints. Deck interrupts the job cooperatively when a cancel is issued from the dashboard or via API.</DocP>
          <DocCb title="app/Jobs/GenerateReport.php">{`use Deck\\Deck\\Middleware\\Cancellable;
use Deck\\Deck\\Support\\JobCancellation;

class GenerateReport implements ShouldQueue
{
    public function middleware(): array
    {
        return [new Cancellable];
    }

    public function handle(): void
    {
        foreach ($this->steps() as $step) {
            JobCancellation::throwIfCancelled($this->job);
            $step->run();
        }
    }
}`}</DocCb>
          <DocP>To cancel a job programmatically:</DocP>
          <DocCb title="php">{`use Deck\\Deck\\Facades\\Deck;

Deck::cancel($jobUuid);`}</DocCb>
          <DocNote>Cancellation is <strong>cooperative</strong> — Deck does not force-kill PHP workers. Cancellation of pending Redis queue jobs is best-effort.</DocNote>

          <DocH2 id="block">Block a job class</DocH2>
          <DocP>Blocking prevents a job class from being dispatched entirely — useful during incidents when you need to halt a class immediately without waiting for it to finish.</DocP>
          <DocCb title="php">{`use Deck\\Deck\\Facades\\Deck;

Deck::blockClass(
    \\App\\Jobs\\SyncInventory::class,
    until: now()->addHour(),
    reason: 'Upstream API outage',
);

Deck::unblockClass(\\App\\Jobs\\SyncInventory::class);`}</DocCb>
          <DocP>Blocked jobs are intercepted at dispatch and recorded with status <C>blocked</C>. Block and unblock actions are also available directly from the job-class page in the dashboard.</DocP>

          <DocH2 id="retry">Retry failed jobs</DocH2>
          <DocP>The <strong>Retry</strong> action on a failed execution uses Horizon's failed-job store when available, then Laravel's <C>failed_jobs</C> table, then a parameterless re-dispatch as a last resort. Available from the Activity page and execution detail page.</DocP>

          <DocH2 id="progress">Job progress</DocH2>
          <DocCb title="php">{`use Deck\\Deck\\Support\\JobProgress;

JobProgress::update($this->job->uuid(), 45, 'Imported 450 of 1000 rows');`}</DocCb>
          <DocP>Progress is shown on the execution detail page while the job is running and cleared automatically on completion or failure.</DocP>

          <DocH2 id="analytics">Runtime analytics</DocH2>
          <DocP>The job-class detail page shows <strong>avg</strong>, <strong>p50</strong>, <strong>p95</strong>, and <strong>failure rate</strong> for the last <C>DECK_CHART_HOURS</C> (default: 24 hours).</DocP>

          <DocH2 id="alerts">Alerts</DocH2>
          <DocP>Deck can notify your team when a job class has not run within a configured window, or when a queue has pending jobs but no workers.</DocP>
          <DocCb title="config/deck.php">{`'alerts' => [
    'enabled'      => env('DECK_ALERTS_ENABLED', false),
    'notification' => \\App\\Notifications\\DeckStaleJobsNotification::class,
    'notifiable'   => \\App\\Models\\User::class,
    'stale_jobs'   => [
        \\App\\Jobs\\SyncInventory::class => ['max_age_hours' => 24],
    ],
],`}</DocCb>
          <DocCb title="routes/console.php">{`Schedule::command('deck:check-alerts')->hourly();`}</DocCb>

          <DocH2 id="queue-admin">Queue administration</DocH2>
          <DocP>From the <strong>Workers</strong> page, operators can clear all <strong>pending</strong> (not reserved or in-flight) jobs from a Redis queue. Requires confirmation and is controlled by <C>DECK_QUEUE_ADMIN_ENABLED</C> (default <C>true</C>).</DocP>

          <DocH2 id="artisan">Artisan commands</DocH2>
          <DocTable
            headers={["Command", "Description"]}
            rows={[
              [<C>deck:install</C>, "Publish config, migrations, and assets"],
              [<C>deck:prune</C>, <span>Delete execution rows older than <C>retention_days</C></span>],
              [<C>deck:check-alerts</C>, "Evaluate stale-job and unprocessed-queue rules"],
              [<C>deck:report-workers</C>, "Push worker snapshots to Deck Cloud (no-op when disabled)"],
            ]}
          />
          <DocNavFooter page="usage" />
        </article>
      );
    }

    function DocsLayout({ page }) {
      const pageMap = {
        'getting-started': <DocsGettingStarted />,
        'usage':           <DocsUsage />,
        'production':      <DocsProduction />,
        'configuration':   <DocsConfiguration />,
        'deck-cloud':      <DeckCloudDocs />,
        'horizon':         <DocsHorizon />,
      };
      return (
        <div className="mx-auto max-w-[1200px] px-6 py-10 lg:py-14">
          <div className="lg:flex lg:gap-14">
            <DocsSidebar page={page} />
            <div className="min-w-0 flex-1">
              <DocsMobileNav page={page} />
              {pageMap[page] || pageMap['getting-started']}
            </div>
          </div>
        </div>
      );
    }

    // ──────────────────────────────────────── footer ─────────────
    function Footer() {
      return (
        <footer className="border-t border-zinc-200/60 bg-white py-12">
          <div className="mx-auto max-w-[1100px] px-6">
            <div className="grid gap-8 sm:grid-cols-[1.5fr_1fr_1fr_1fr]">
              <div>
                <a href="/"><Logo size="sm"/></a>
                <p className="mt-4 max-w-[280px] text-[13px] leading-[1.6] text-zinc-500">
                  Job-class observability and cooperative cancellation for Laravel apps running Horizon.
                </p>
                <div className="mt-5 flex items-center gap-3 text-zinc-400">
                  <a href="https://github.com/getdeckapp/deck" target="_blank" rel="noopener" className="hover:text-zinc-700">
                    <Icon d={IC.github} size={18} strokeWidth={0} className="fill-current"/>
                  </a>
                </div>
              </div>
              <FooterCol title="Product" items={[{ label: "Features", href: "/#features" }, { label: "vs Horizon", href: "/#compare" }, { label: "Pricing", href: "/#pricing" }, { label: "Waitlist", href: "/#waitlist" }]}/>
              <FooterCol title="Docs" items={DOCS_FLAT.map(p => ({ label: p.label, href: `/docs/${p.id}` }))}/>
              <FooterCol title="Resources" items={[{ label: "GitHub", href: "https://github.com/getdeckapp/deck" }, { label: "Packagist", href: "https://packagist.org/packages/deck/deck" }, { label: "MIT License", href: "https://github.com/getdeckapp/deck/blob/master/LICENSE" }]}/>
            </div>
            <div className="mt-12 flex flex-wrap items-center justify-between gap-3 border-t border-zinc-100 pt-6 text-[12px] text-zinc-500">
              <p>© 2026 Deck. MIT licensed. Built by <a href="https://github.com/tormjens" className="text-zinc-700 hover:text-zinc-900">@tormjens</a>.</p>
              <p className="font-mono"><span className="text-zinc-400">Cloud waitlist open</span></p>
            </div>
          </div>
        </footer>
      );
    }
    function FooterCol({ title, items }) {
      const navigate = useContext(NavCtx);
      return (
        <div>
          <p className="font-mono text-[10.5px] font-semibold uppercase tracking-[0.12em] text-zinc-500">{title}</p>
          <ul className="mt-3 space-y-2 text-[13px]">
            {items.map((it) => {
              const isDoc = it.href.startsWith('/docs/');
              const id = isDoc ? it.href.replace('/docs/', '') : null;
              return (
                <li key={it.label}>
                  <a
                    href={it.href}
                    onClick={isDoc ? (e => { e.preventDefault(); navigate(id); }) : undefined}
                    className="text-zinc-700 hover:text-zinc-900"
                  >{it.label}</a>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    // ──────────────────────────────────────── app ────────────────
    function App() {
      const [page, navigate] = useDocsRouter();
      useEffect(() => {
        document.title = `${DOCS_FLAT.find(p => p.id === page)?.label ?? 'Documentation'} — Deck docs`;
      }, [page]);
      return (
        <NavCtx.Provider value={navigate}>
          <Nav />
          <DocsLayout page={page} />
          <Footer />
        </NavCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
