    function Icon({ d, size = 16, className = "", strokeWidth = 1.75 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} className={className} aria-hidden="true">
          <path strokeLinecap="round" strokeLinejoin="round" d={d} />
        </svg>

    }

    // ──────────────────────────────────────────────── logo ───────

      const s = { sm: { mark: 30, text: "text-[15px]" }, md: { mark: 36, text: "text-[16px]" }, lg: { mark: 48, text: "text-[20px]" } }[size] || {};
      const dark = variant === "dark";
      const gradId = `lg-${variant}-${size}`;
      const hiId = `lh-${variant}-${size}`;
      return (
        <div className="flex items-center gap-2.5">
          <svg width={s.mark} height={s.mark} viewBox="0 0 40 40" aria-hidden="true" className="shrink-0">
            <defs>
              <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={dark ? "#7c83f7" : "#6366f1"} />
                <stop offset="100%" stopColor={dark ? "#4f46e5" : "#4338ca"} />
              </linearGradient>
              <linearGradient id={hiId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="rgba(255,255,255,0.18)" />
                <stop offset="55%" stopColor="rgba(255,255,255,0)" />

            <circle cx="27" cy="21" r="1.4" fill={dark ? "#4f46e5" : "#4338ca"}/>

            <path d="M16 17h11" stroke="white" strokeWidth="1.6" strokeLinecap="round" opacity="0.7"/>
          </svg>
          {showLabel && (
            <div className="leading-none">
              <p className={`${s.text} font-semibold tracking-[-0.025em] ${dark ? "text-white" : "text-zinc-950"}`}>Deck</p>

    // ──────────────────────────────────────────────── nav ────────

      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 8);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      return (
        <header className={`sticky top-0 z-40 transition ${scrolled ? "border-zinc-200/60 bg-white/80 backdrop-blur-md" : "border-transparent bg-transparent"} border-b`}>
          <div className="mx-auto flex max-w-[1200px] items-center justify-between gap-6 px-6 py-3.5">
            <a href="#" className="rounded-lg focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
              <Logo size="sm" />
            </a>
            <nav className="hidden items-center gap-6 text-[13.5px] font-medium text-zinc-600 lg:flex">
              <a href="#features" className="hover:text-zinc-900">Features</a>
              <a href="#compare" className="hover:text-zinc-900">vs Horizon</a>
              <a href="#code" className="hover:text-zinc-900">Code</a>
              <a href="#pricing" className="hover:text-zinc-900">Pricing</a>
            </nav>
            <div className="flex items-center gap-2">
              <a href="https://github.com/tormjens/deck" target="_blank" rel="noopener" className="inline-flex items-center gap-1.5 rounded-lg px-2.5 py-1.5 text-[13px] font-medium text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900">

                <span className="hidden sm:inline">GitHub</span>
              </a>
              <a href="#waitlist" className="inline-flex items-center gap-1.5 rounded-lg bg-zinc-900 px-3 py-1.5 text-[13px] font-semibold text-white shadow-[0_1px_0_rgba(255,255,255,0.18)_inset,0_1px_2px_rgba(15,23,42,0.20)] hover:bg-zinc-800">
                Join waitlist
                <span className="opacity-60">→</span>
              </a>
            </div>
          </div>
        </header>
      );
    }

    // ──────────────────────────────────────────────── hero ───────

      return (
        <section className="relative overflow-hidden">

          <div className="absolute left-1/2 top-0 -z-10 h-[640px] w-[1200px] -translate-x-1/2 opacity-80"
            style={{ background: "radial-gradient(50% 60% at 50% 0%, rgba(99,102,241,0.22) 0%, rgba(99,102,241,0.04) 50%, transparent 80%)" }} />
          <div className="absolute left-1/2 top-32 -z-10 h-[440px] w-[900px] -translate-x-1/2"
            style={{ background: "radial-gradient(40% 50% at 80% 30%, rgba(244,114,182,0.10) 0%, transparent 60%), radial-gradient(40% 50% at 20% 50%, rgba(56,189,248,0.10) 0%, transparent 60%)" }} />

            style={{ backgroundImage: "radial-gradient(rgba(15,23,42,0.10) 1px, transparent 1px)", backgroundSize: "28px 28px", maskImage: "radial-gradient(ellipse 80% 60% at 50% 35%, black 0%, transparent 70%)", WebkitMaskImage: "radial-gradient(ellipse 80% 60% at 50% 35%, black 0%, transparent 70%)" }} />

                <span className="inline-flex items-center gap-1.5 rounded-full bg-indigo-50 px-2 py-0.5 font-mono text-[10.5px] font-semibold uppercase tracking-[0.10em] text-indigo-700 ring-1 ring-inset ring-indigo-600/20">
                  <span className="relative inline-flex size-1.5">
                    <span className="absolute inset-0 animate-ping-slow rounded-full bg-indigo-500 opacity-70" />
                    <span className="relative size-1.5 rounded-full bg-indigo-500" />

                  Deck Cloud

                <span className="text-zinc-600">Early access · join the waitlist</span>
                <span className="text-zinc-300">→</span>

                <br/>

                  Join the waitlist
                  <span className="opacity-60 transition group-hover:translate-x-0.5">→</span>
                </a>
                <a href="#code"
                  className="inline-flex items-center gap-2 rounded-xl bg-white px-5 py-3 text-[14px] font-semibold text-zinc-900 ring-1 ring-inset ring-zinc-200 shadow-[0_1px_2px_rgba(15,23,42,0.04)] hover:bg-zinc-50 hover:ring-zinc-300">

              <div className="mt-7 flex items-center justify-center">
                <code className="inline-flex items-center gap-3 rounded-lg border border-zinc-200/80 bg-white/80 px-4 py-2 font-mono text-[12.5px] text-zinc-700 shadow-[0_1px_2px_rgba(15,23,42,0.04)] backdrop-blur">

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const copy = () => {
        navigator.clipboard?.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); });
      };
      return (
        <button onClick={copy} className="ml-1 text-zinc-400 hover:text-zinc-700 transition" aria-label="Copy command">
          {copied
            ? <Icon d={IC.check} size={13} className="text-emerald-600" />
            : <Icon d={IC.copy} size={13} />}
        </button>
      );
    }

            <div className="grid grid-cols-12">
              {/* Sidebar */}
              <div className="col-span-3 hidden bg-gradient-to-b from-zinc-950 to-zinc-900 lg:block relative overflow-hidden">
                <div className="absolute inset-x-0 top-0 h-32" style={{ background: "radial-gradient(60% 80% at 30% 0%, rgba(99,102,241,0.28) 0%, transparent 70%)" }} />

                      <div key={it.label} className={`relative flex items-center justify-between gap-2 rounded-md px-2 py-1.5 font-medium ${it.active ? "bg-gradient-to-r from-indigo-500/[0.18] via-indigo-500/[0.10] to-transparent text-white ring-1 ring-inset ring-indigo-400/20" : "text-zinc-400"}`}>
                        {it.active && <span className="absolute left-0 top-1/2 h-3 w-[2px] -translate-y-1/2 rounded-r bg-indigo-400" style={{ boxShadow: "0 0 8px rgba(129,140,248,0.6)" }}/>}

                        {it.count && <span className="rounded bg-white/[0.06] px-1.5 py-0.5 font-mono text-[9.5px] text-zinc-400 ring-1 ring-white/10">{it.count}</span>}

                    <span className="relative inline-flex size-1.5">
                      <span className="absolute inset-0 animate-ping-slow rounded-full bg-emerald-500 opacity-70" />

    function SparkChart({ values }) {
      const W = 600, H = 90, PT = 8, PB = 10;
      const max = Math.max(...values, 1);
      const xs = (i) => i * (W / (values.length - 1));
      const ys = (v) => H - PB - (v / max) * (H - PT - PB);
      const pts = values.map((v, i) => [xs(i), ys(v)]);
      const line = pts.reduce((a, [x, y], i) => {
        if (i === 0) return `M ${x.toFixed(1)} ${y.toFixed(1)}`;
        const [px, py] = pts[i - 1];
        const cx = (px + x) / 2;
        return `${a} C ${cx.toFixed(1)} ${py.toFixed(1)},${cx.toFixed(1)} ${y.toFixed(1)},${x.toFixed(1)} ${y.toFixed(1)}`;
      }, "");
      const area = `${line} L ${pts[pts.length-1][0]} ${H} L ${pts[0][0]} ${H} Z`;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" preserveAspectRatio="none">
          <defs>
            <linearGradient id="fill-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#6366f1" stopOpacity="0.30"/>
              <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={area} fill="url(#fill-grad)"/>
          <path d={line} fill="none" stroke="#6366f1" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

      );
    }

    // ─────────────────────────────────────────── waitlist CTA ────
    function WaitlistCTA() {
      const [email, setEmail] = useState("");
      const [status, setStatus] = useState("idle"); // idle | loading | success | error

      const submit = async (e) => {
        e.preventDefault();
        if (!email || status === "loading" || status === "success") return;
        setStatus("loading");
        try {
          // ── Replace YOUR_FORM_ID below with your Formspree form ID ──
          // Sign up free at formspree.io, create a form, and paste the ID here.
          // Example: "xpznydkb"
          const FORMSPREE_ID = "xnjrqwkg";
          const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({ email, _subject: "Deck Cloud waitlist" }),
          });
          if (res.ok) { setStatus("success"); setEmail(""); }
          else { setStatus("error"); }
        } catch {
          setStatus("error");
        }
      };

      return (
        <section id="waitlist" className="relative overflow-hidden py-20">
          <div className="absolute inset-0 -z-10" style={{ background: "radial-gradient(60% 80% at 50% 0%, rgba(99,102,241,0.16) 0%, transparent 70%)" }} />
          <div className="mx-auto max-w-[900px] px-6">
            <div className="relative overflow-hidden rounded-3xl border border-zinc-200/70 bg-gradient-to-br from-zinc-950 via-zinc-900 to-zinc-950 px-8 py-14 sm:px-14 shadow-[0_24px_60px_-16px_rgba(15,23,42,0.40),0_0_0_1px_rgba(15,23,42,0.10)]">
              {/* Glows */}
              <div className="absolute -right-20 -top-20 size-[400px] rounded-full opacity-50" style={{ background: "radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 70%)" }} />
              <div className="absolute -left-20 -bottom-20 size-[300px] rounded-full opacity-40" style={{ background: "radial-gradient(circle, rgba(168,85,247,0.30) 0%, transparent 70%)" }} />
              {/* Dot grid */}
              <div className="absolute inset-0 opacity-[0.05]" style={{ backgroundImage: "radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px)", backgroundSize: "20px 20px" }} />

              <div className="relative max-w-[640px]">
                <Logo size="md" variant="dark" showLabel={false}/>
                <h2 className="mt-6 text-[38px] font-semibold tracking-[-0.025em] text-white leading-[1.1] sm:text-[46px]">
                  Your queues already<br/>have a memory.<br/>
                  <span className="bg-gradient-to-r from-indigo-300 to-violet-300 bg-clip-text text-transparent">Stop forgetting.</span>
                </h2>
                <p className="mt-5 max-w-[480px] text-[15px] leading-[1.65] text-zinc-300">
                  Deck Cloud is in early access. Leave your email and you'll be among the first to know when it opens — plus you lock in the launch pricing.
                </p>

                {status === "success" ? (
                  <div className="mt-8 flex items-center gap-3 rounded-xl bg-emerald-500/15 px-5 py-4 ring-1 ring-inset ring-emerald-400/30">
                    <span className="inline-flex size-8 shrink-0 items-center justify-center rounded-full bg-emerald-500 text-white">
                      <Icon d={IC.check} size={16} strokeWidth={2.5}/>
                    </span>
                    <div>
                      <p className="text-[14px] font-semibold text-emerald-300">You're on the list.</p>
                      <p className="text-[13px] text-emerald-400/80">We'll reach out when Deck Cloud opens early access.</p>
                    </div>
                  </div>
                ) : (
                  <form onSubmit={submit} className="mt-8">
                    <div className="flex flex-col gap-3 sm:flex-row sm:items-center">
                      <div className="relative flex-1">
                        <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none">
                          <Icon d={IC.mail} size={15}/>
                        </span>
                        <input
                          type="email"
                          required
                          placeholder="you@yourapp.com"
                          value={email}
                          onChange={(e) => setEmail(e.target.value)}
                          className="w-full rounded-xl bg-white/[0.07] pl-10 pr-4 py-3 text-[14px] text-white placeholder-zinc-500 ring-1 ring-inset ring-white/15 focus:outline-none focus:ring-indigo-400/60 transition"
                        />
                      </div>
                      <button
                        type="submit"
                        disabled={status === "loading"}
                        className="group inline-flex items-center justify-center gap-2 rounded-xl bg-white px-5 py-3 text-[14px] font-semibold text-zinc-900 shadow-[0_1px_0_rgba(255,255,255,0.6)_inset,0_8px_24px_-4px_rgba(255,255,255,0.20)] hover:bg-zinc-100 disabled:opacity-70 transition whitespace-nowrap"
                      >
                        {status === "loading" ? "Joining…" : "Join the waitlist"}
                        {status !== "loading" && <span className="opacity-60 transition group-hover:translate-x-0.5">→</span>}
                      </button>
                    </div>
                    {status === "error" && (
                      <p className="mt-3 text-[13px] text-rose-400">Something went wrong — try again or email us directly.</p>
                    )}
                    <p className="mt-3 text-[12px] text-zinc-600">No spam. Unsubscribe any time. Waitlist members get first access and launch pricing.</p>
                  </form>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ─────────────────────────────────────────────── footer ──────
    function Footer() {
      return (
        <footer className="border-t border-zinc-200/60 bg-white py-12">
          <div className="mx-auto max-w-[1100px] px-6">
            <div className="grid gap-8 sm:grid-cols-[1.5fr_1fr_1fr_1fr]">
              <div>
                <Logo size="sm"/>
                <p className="mt-4 max-w-[280px] text-[13px] leading-[1.6] text-zinc-500">
                  Job-class observability and cooperative cancellation for Laravel apps running Horizon.
                </p>
                <div className="mt-5 flex items-center gap-3 text-zinc-400">
                  <a href="https://github.com/tormjens/deck" target="_blank" rel="noopener" className="hover:text-zinc-700">
                    <Icon d={IC.github} size={18} strokeWidth={0} className="fill-current"/>
                  </a>
                </div>
              </div>
              <FooterCol title="Product" items={[{ label: "Features", href: "#features" }, { label: "vs Horizon", href: "#compare" }, { label: "Pricing", href: "#pricing" }, { label: "Waitlist", href: "#waitlist" }]}/>
              <FooterCol title="Resources" items={[{ label: "GitHub", href: "https://github.com/tormjens/deck" }, { label: "Packagist", href: "https://packagist.org/packages/tormjens/deck" }]}/>
              <FooterCol title="Legal" items={[{ label: "MIT License", href: "https://github.com/tormjens/deck/blob/master/LICENSE" }]}/>
            </div>
            <div className="mt-12 flex flex-wrap items-center justify-between gap-3 border-t border-zinc-100 pt-6 text-[12px] text-zinc-500">
              <p>© 2026 Deck. MIT licensed. Built by <a href="https://github.com/tormjens" className="text-zinc-700 hover:text-zinc-900">@tormjens</a>.</p>
              <p className="font-mono"><span className="text-zinc-400">Cloud waitlist open</span></p>
            </div>
          </div>
        </footer>
      );
    }

    function FooterCol({ title, items }) {
      return (
        <div>
          <p className="font-mono text-[10.5px] font-semibold uppercase tracking-[0.12em] text-zinc-500">{title}</p>
          <ul className="mt-3 space-y-2 text-[13px]">
            {items.map((it) => (
              <li key={it.label}>
                <a href={it.href} className="text-zinc-700 hover:text-zinc-900">{it.label}</a>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────── app ─────────
    function App() {
      return (
        <>
          <Nav/>
          <Hero/>
          <Comparison/>
          <Features/>
          <CodeSection/>
          <Pricing/>
          <WaitlistCTA/>
          <Footer/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
