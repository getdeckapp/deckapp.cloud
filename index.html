      return (
        <div className="flex items-center gap-2.5">
          <svg width={s.mark} height={s.mark} viewBox="0 0 40 40" aria-hidden="true" className="shrink-0">

              <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">

      useEffect(() => {

        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      return (
        <header className={`sticky top-0 z-40 transition ${scrolled ? "border-zinc-200/60 bg-white/80 backdrop-blur-md" : "border-transparent bg-transparent"} border-b`}>
          <div className="mx-auto flex max-w-[1200px] items-center justify-between gap-6 px-6 py-3.5">
            <a href="#" className="rounded-lg focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
              <Logo size="sm" />
            </a>
            <nav className="hidden items-center gap-6 text-[13.5px] font-medium text-zinc-600 lg:flex">
              <a href="#features" className="hover:text-zinc-900">Features</a>
              <a href="#compare" className="hover:text-zinc-900">vs Horizon</a>
              <a href="#code" className="hover:text-zinc-900">Code</a>
              <a href="#pricing" className="hover:text-zinc-900">Pricing</a>

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const copy = () => {
        navigator.clipboard?.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); });
      };
      return (
        <button onClick={copy} className="ml-1 text-zinc-400 hover:text-zinc-700 transition" aria-label="Copy command">
          {copied
            ? <Icon d={IC.check} size={13} className="text-emerald-600" />
            : <Icon d={IC.copy} size={13} />}
        </button>
      );

    function SparkChart({ values }) {
      const W = 600, H = 90, PT = 8, PB = 10;
      const max = Math.max(...values, 1);
      const xs = (i) => i * (W / (values.length - 1));
      const ys = (v) => H - PB - (v / max) * (H - PT - PB);
      const pts = values.map((v, i) => [xs(i), ys(v)]);
      const line = pts.reduce((a, [x, y], i) => {
        if (i === 0) return `M ${x.toFixed(1)} ${y.toFixed(1)}`;
        const [px, py] = pts[i - 1];
        const cx = (px + x) / 2;
        return `${a} C ${cx.toFixed(1)} ${py.toFixed(1)},${cx.toFixed(1)} ${y.toFixed(1)},${x.toFixed(1)} ${y.toFixed(1)}`;
      }, "");
      const area = `${line} L ${pts[pts.length-1][0]} ${H} L ${pts[0][0]} ${H} Z`;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" preserveAspectRatio="none">
          <defs>
            <linearGradient id="fill-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#6366f1" stopOpacity="0.30"/>
              <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={area} fill="url(#fill-grad)"/>
          <path d={line} fill="none" stroke="#6366f1" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

        setStatus("loading");

          // Sign up free at formspree.io, create a form, and paste the ID here.
          // Example: "xpznydkb"
          const FORMSPREE_ID = "xnjrqwkg";

            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({ email, _subject: "Deck Cloud waitlist" }),
          });
          if (res.ok) { setStatus("success"); setEmail(""); }

                {status === "success" ? (
                  <div className="mt-8 flex items-center gap-3 rounded-xl bg-emerald-500/15 px-5 py-4 ring-1 ring-inset ring-emerald-400/30">
                    <span className="inline-flex size-8 shrink-0 items-center justify-center rounded-full bg-emerald-500 text-white">

          <DocCb title="">{`┌─────────────────────────────────────────────────────────┐
│  Your Laravel app                                        │
├──────────────────────────┬──────────────────────────────┤
│  Horizon (runtime)       │  Deck (control plane)        │
│  • horizon artisan       │  • Queue event listeners     │
│  • Workers & balancing   │  • DB execution log          │
│  • /horizon dashboard    │  • /deck dashboard           │
│  • Recent/failed in Redis│  • Last run, search, cancel  │
└──────────────────────────┴──────────────────────────────┘
                          Redis queues`}</DocCb>

          <DocH2 id="which-tool">Choose the right tool</DocH2>
          <DocTable
            headers={["Task", "Use"]}
            rows={[
              ["Worker health, scaling, supervisors, throughput", "Horizon"],
              ["Job-class history, search, cancel, block, alerts", "Deck"],
            ]}
          />

          <DocH2 id="pain-points">Common pain points Deck solves</DocH2>
          <ul className="my-4 space-y-3">
            {[
              "Jobs vanish from Horizon Recent before delayed runs execute — they live in Deck's log indefinitely.",
              "No answer to "when did ProcessInvoice last succeed?" — Deck shows last-run status per class.",
              "No safe way to stop a job class from a dashboard — Deck adds cooperative cancel and class blocking.",
            ].map((item, i) => (
              <li key={i} className="flex items-start gap-3 text-[14px] leading-[1.65] text-zinc-600">

    // ──────────────────────────────────────── page: usage ────────
    function DocsUsage() {
      return (
        <article className="max-w-[720px]">
          <p className="mb-2 font-mono text-[11px] font-semibold uppercase tracking-[0.14em] text-indigo-600">Usage</p>
          <DocH1>Using the dashboard</DocH1>
          <DocP>After installation, Deck listens to queue events and records starts, completions, and failures automatically. No code changes required for basic history.</DocP>

          <DocH2 id="routes">Dashboard routes</DocH2>
          <DocTable
            headers={["Route", "Purpose"]}
            rows={[
              [<C>/deck</C>, "Overview, charts, recent failures, queue health"],
              [<C>/deck/classes</C>, "Per-class stats and history"],
              [<C>/deck/activity</C>, "Searchable execution log"],
              [<C>/deck/workers</C>, "Horizon snapshot and unprocessed queues"],
            ]}
          />
          <DocP>The prefix is configurable via <C>deck.route_prefix</C> in <C>config/deck.php</C>.</DocP>

          <DocH2 id="cancel">Cooperative cancellation</DocH2>
          <DocP>Add the <C>Cancellable</C> middleware and call <C>throwIfCancelled()</C> at checkpoints. Deck interrupts the job cooperatively when a cancel is issued from the dashboard or via API.</DocP>
          <DocCb title="app/Jobs/GenerateReport.php">{`use Deck\\Deck\\Middleware\\Cancellable;
use Deck\\Deck\\Support\\JobCancellation;

class GenerateReport implements ShouldQueue
{
    public function middleware(): array
    {
        return [new Cancellable];
    }

    public function handle(): void
    {
        foreach ($this->steps() as $step) {
            JobCancellation::throwIfCancelled($this->job);
            $step->run();
        }
    }
}`}</DocCb>
          <DocP>To cancel a job programmatically:</DocP>
          <DocCb title="php">{`use Deck\\Deck\\Facades\\Deck;

Deck::cancel($jobUuid);`}</DocCb>
          <DocNote>Cancellation is <strong>cooperative</strong> — Deck does not force-kill PHP workers. Cancellation of pending Redis queue jobs is best-effort.</DocNote>

          <DocH2 id="block">Block a job class</DocH2>
          <DocP>Blocking prevents a job class from being dispatched entirely — useful during incidents when you need to halt a class immediately without waiting for it to finish.</DocP>
          <DocCb title="php">{`use Deck\\Deck\\Facades\\Deck;

Deck::blockClass(
    \\App\\Jobs\\SyncInventory::class,
    until: now()->addHour(),
    reason: 'Upstream API outage',
);

Deck::unblockClass(\\App\\Jobs\\SyncInventory::class);`}</DocCb>
          <DocP>Blocked jobs are intercepted at dispatch and recorded with status <C>blocked</C>. Block and unblock actions are also available directly from the job-class page in the dashboard.</DocP>

          <DocH2 id="retry">Retry failed jobs</DocH2>
          <DocP>The <strong>Retry</strong> action on a failed execution uses Horizon's failed-job store when available, then Laravel's <C>failed_jobs</C> table, then a parameterless re-dispatch as a last resort. Available from the Activity page and execution detail page.</DocP>

          <DocH2 id="progress">Job progress</DocH2>
          <DocCb title="php">{`use Deck\\Deck\\Support\\JobProgress;

JobProgress::update($this->job->uuid(), 45, 'Imported 450 of 1000 rows');`}</DocCb>
          <DocP>Progress is shown on the execution detail page while the job is running and cleared automatically on completion or failure.</DocP>

          <DocH2 id="analytics">Runtime analytics</DocH2>
          <DocP>The job-class detail page shows <strong>avg</strong>, <strong>p50</strong>, <strong>p95</strong>, and <strong>failure rate</strong> for the last <C>DECK_CHART_HOURS</C> (default: 24 hours).</DocP>

          <DocH2 id="alerts">Alerts</DocH2>
          <DocP>Deck can notify your team when a job class has not run within a configured window, or when a queue has pending jobs but no workers.</DocP>
          <DocCb title="config/deck.php">{`'alerts' => [
    'enabled'      => env('DECK_ALERTS_ENABLED', false),
    'notification' => \\App\\Notifications\\DeckStaleJobsNotification::class,
    'notifiable'   => \\App\\Models\\User::class,
    'stale_jobs'   => [
        \\App\\Jobs\\SyncInventory::class => ['max_age_hours' => 24],
    ],
],`}</DocCb>
          <DocCb title="routes/console.php">{`Schedule::command('deck:check-alerts')->hourly();`}</DocCb>

          <DocH2 id="queue-admin">Queue administration</DocH2>
          <DocP>From the <strong>Workers</strong> page, operators can clear all <strong>pending</strong> (not reserved or in-flight) jobs from a Redis queue. Requires confirmation and is controlled by <C>DECK_QUEUE_ADMIN_ENABLED</C> (default <C>true</C>).</DocP>

          <DocH2 id="artisan">Artisan commands</DocH2>
          <DocTable
            headers={["Command", "Description"]}
            rows={[
              [<C>deck:install</C>, "Publish config, migrations, and assets"],
              [<C>deck:prune</C>, <span>Delete execution rows older than <C>retention_days</C></span>],
              [<C>deck:check-alerts</C>, "Evaluate stale-job and unprocessed-queue rules"],
              [<C>deck:report-workers</C>, "Push worker snapshots to Deck Cloud (no-op when disabled)"],
            ]}
          />
          <DocNavFooter page="usage" />
        </article>
      );
    }

    // ──────────────────────────────────────── page: production ───
    function DocsProduction() {
      return (
        <article className="max-w-[720px]">
          <p className="mb-2 font-mono text-[11px] font-semibold uppercase tracking-[0.14em] text-indigo-600">Production</p>
          <DocH1>Production checklist</DocH1>
          <DocP>Deck appends a row on every job start, completion, and failure. The following checklist keeps it fast and secure on busy queues.</DocP>

          <DocH2 id="dedicated-db">Dedicated database (recommended)</DocH2>
          <DocP>On busy queues, use a separate database to avoid load on your primary application DB.</DocP>
          <DocCb title="config/database.php">{`'connections' => [
    'deck' => [
        'driver'   => 'mysql',
        'host'     => env('DECK_DB_HOST', '127.0.0.1'),
        'database' => env('DECK_DB_DATABASE', 'deck'),
        'username' => env('DECK_DB_USERNAME', 'deck'),
        'password' => env('DECK_DB_PASSWORD', ''),
        // ...
    ],
],`}</DocCb>
          <DocCb title=".env">{`DECK_DB_CONNECTION=deck`}</DocCb>
          <DocP>Run only the Deck migrations on that connection:</DocP>
          <DocCb title="bash">{`php artisan migrate --database=deck \\
  --path=database/migrations/2025_01_01_000000_create_deck_tables.php`}</DocCb>
          <DocWarn>Do <strong>not</strong> run a blanket <C>php artisan migrate --database=deck</C> unless that database is dedicated to Deck. Grant the app user read/write on <C>deck_*</C> tables only.</DocWarn>
          <DocP>If <C>DECK_DB_CONNECTION</C> is unset, Deck uses Laravel's default connection.</DocP>

          <DocH2 id="identity">Stable installation identity</DocH2>
          <DocCb title=".env">{`DECK_PROJECT=billing-api
DECK_ENVIRONMENT=production`}</DocCb>
          <DocP>Use a stable <C>DECK_PROJECT</C> per service. Defaults (<C>APP_NAME</C>, <C>APP_ENV</C>) are often too generic for multi-app teams and cause stats to collide across services.</DocP>

          <DocH2 id="retention">Retention and pruning</DocH2>
          <DocCb title=".env">{`DECK_RETENTION_DAYS=90`}</DocCb>
          <DocCb title="routes/console.php">{`Schedule::command('deck:prune')->daily();`}</DocCb>

          <DocH2 id="security">Secure the dashboard</DocH2>
          <ul className="my-4 space-y-3">
            {[
              <span key="a">Restrict <C>/deck</C> to operators — use Horizon's gate or a custom <C>deck.auth</C> callback.</span>,
              "Do not expose Deck publicly without authentication.",
              "Treat cancel, block, and retry as privileged queue operations.",
            ].map((item, i) => (
              <li key={i} className="flex items-start gap-2.5 text-[14px] leading-[1.65] text-zinc-600">
                <Icon d={IC.shield} size={15} className="mt-0.5 shrink-0 text-zinc-400"/>
                <span>{item}</span>
              </li>
            ))}
          </ul>
          <DocCb title="config/deck.php">{`'auth' => fn ($request) => $request->user()?->can('view-horizon') ?? false,`}</DocCb>

          <DocH2 id="redis">Redis for cancel and block flags</DocH2>
          <DocP>All Horizon workers must share the same cache store for cancel and block flags to work correctly across servers.</DocP>
          <DocCb title=".env">{`DECK_CANCEL_CACHE_STORE=redis
DECK_BLOCK_CACHE_STORE=redis`}</DocCb>
          <DocWarn>Never use <C>file</C> or <C>array</C> cache in multi-server deployments — flags will not propagate across workers.</DocWarn>

          <DocH2 id="high-volume">High job volume</DocH2>
          <ul className="my-4 space-y-2">
            {[
              "Use a dedicated database (see above).",
              <span key="b">Keep <C>DECK_STORE_CONTEXT=false</C> unless you need opt-in debug fields.</span>,
              "Lower retention or prune more aggressively when volume is extreme.",
              "Monitor the Deck DB connection pool.",
            ].map((item, i) => (
              <li key={i} className="flex items-start gap-2.5 text-[14px] leading-[1.65] text-zinc-600">
                <span className="mt-1.5 size-1.5 shrink-0 rounded-full bg-zinc-300"/>
                <span>{item}</span>
              </li>
            ))}
          </ul>

          <DocH2 id="scheduled-commands">Scheduled commands</DocH2>
          <DocTable
            headers={["Command", "Schedule", "Purpose"]}
            rows={[
              [<C>deck:prune</C>, "Daily", "Remove old execution history"],
              [<C>deck:check-alerts</C>, "Hourly (when enabled)", "Stale jobs and unprocessed queues"],
              [<C>deck:report-workers</C>, "Optional", "Push workers to Deck Cloud"],
            ]}
          />

          <DocH2 id="payloads">Payloads and sensitive data</DocH2>
          <DocP>Deck does <strong>not</strong> store serialized job payloads by default. Exception messages are truncated; stack traces are capped at 64 KB (<C>DECK_EXCEPTION_TRACE_BYTES</C>).</DocP>
          <DocCb title=".env">{`DECK_STORE_CONTEXT=true`}</DocCb>
          <DocNote>Only use context storage when jobs implement <C>Deck\Deck\Contracts\ExposesDeckContext</C> and expose only non-sensitive scalars — never tokens, passwords, or PII.</DocNote>

          <DocH2 id="incident-response">Incident response</DocH2>
          <DocP>Standard playbook for a runaway or broken job class:</DocP>
          <ol className="my-4 space-y-3">
            {[
              <span key="1"><strong>Block the job class</strong> — stops new dispatches immediately; optionally cancel in-flight runs.</span>,
              <span key="2"><strong>Cancel running jobs</strong> — cooperative; requires <C>Cancellable</C> middleware and <C>JobCancellation::throwIfCancelled()</C>.</span>,
              <span key="3"><strong>Retry failed jobs</strong> — from the Activity page after the fix is deployed.</span>,
            ].map((item, i) => (
              <li key={i} className="flex items-start gap-3 text-[14px] leading-[1.65] text-zinc-600">
                <span className="flex size-5 shrink-0 items-center justify-center rounded-full bg-indigo-600 font-mono text-[11px] font-semibold text-white">{i + 1}</span>
                <span className="mt-0.5">{item}</span>
              </li>
            ))}
          </ol>

          <DocH2 id="unprocessed-queues">Unprocessed queue warnings</DocH2>
          <DocP>With Horizon installed, Deck surfaces queues with pending jobs but no workers (<C>DECK_UNPROCESSED_QUEUES_ENABLED</C>, default <C>true</C>). Review the <strong>Workers</strong> page after deploys or Horizon config changes.</DocP>
          <DocNavFooter page="production" />
        </article>
      );
    }

    // ──────────────────────────────────────── page: configuration
    function DocsConfiguration() {
      return (
        <article className="max-w-[800px]">
          <p className="mb-2 font-mono text-[11px] font-semibold uppercase tracking-[0.14em] text-indigo-600">Configuration</p>
          <DocH1>Configuration reference</DocH1>
          <DocP>Publish <C>config/deck.php</C> with <C>php artisan deck:install</C>. Most settings have an environment variable equivalent listed here.</DocP>

          <DocH2 id="env-vars">Environment variables</DocH2>
          <DocTable
            headers={["Variable", "Default", "Purpose"]}
            rows={[
              [<C>DECK_DB_CONNECTION</C>, "—", "Laravel connection for deck_* tables"],
              [<C>DECK_PROJECT</C>, <C>APP_NAME</C>, "Stable deployable identifier"],
              [<C>DECK_ENVIRONMENT</C>, <C>APP_ENV</C>, "Environment label"],
              [<C>DECK_RETENTION_DAYS</C>, "90", "Execution history retention in days"],
              [<C>DECK_CANCEL_CACHE_STORE</C>, <C>cache.default</C>, "Cache store for cancel flags"],
              [<C>DECK_BLOCK_CACHE_STORE</C>, "same as cancel", "Cache store for block flags"],
              [<C>DECK_LONG_RUNNING_THRESHOLD_SECONDS</C>, "300", "Highlight long-running jobs"],
              [<C>DECK_STORE_CONTEXT</C>, "false", <span>Persist opt-in <C>deckContext()</C> JSON</span>],
              [<C>DECK_ALERTS_ENABLED</C>, "false", "Stale-job notifications"],
              [<C>DECK_UNPROCESSED_QUEUES_ENABLED</C>, "true", "Detect queues without workers"],
              [<C>DECK_HORIZON_PROMPT</C>, "true", <span>Horizon vs Deck choice on <C>/horizon</C></span>],
              [<C>DECK_DEFER_SIDE_EFFECTS</C>, "true", "Defer block side effects during web requests"],
              [<C>DECK_QUEUE_ADMIN_ENABLED</C>, "true", "Clear-queue actions on Workers page"],
              [<C>DECK_CHART_HOURS</C>, "24", "Analytics window for charts"],
            ]}
          />

          <DocH2 id="config-keys">Config keys (published file)</DocH2>
          <DocTable
            headers={["Key", "Purpose"]}
            rows={[
              [<C>route_prefix</C>, <span>Dashboard URL prefix (default: <C>deck</C>)</span>],
              [<C>middleware</C>, "Route middleware stack"],
              [<C>auth</C>, <span>Authorization callback (<C>null</C> = use Horizon when bootstrapped)</span>],
              [<C>database_connection</C>, <span>Same as <C>DECK_DB_CONNECTION</C></span>],
              [<C>retention_days</C>, "Prune threshold"],
              [<C>cancel_ttl_seconds</C>, "Redis TTL for cancel flags"],
              [<C>long_running_threshold_seconds</C>, "Long-running highlight"],
              [<C>store_context</C>, "Opt-in job context JSON"],
              [<C>alerts.*</C>, "Stale-job rules, notification class, notifiable model"],
              [<C>unprocessed_queues.*</C>, "Unprocessed-queue detection settings"],
              [<C>horizon.*</C>, "Prompt, banner, and remember-choice settings"],
              [<C>poll.*</C>, "Livewire polling intervals in seconds"],
              [<C>tables.*</C>, "Table names if customized"],
              [<C>cloud.*</C>, <span>Deck Cloud agent — see <a href="#docs/deck-cloud" className="text-indigo-600 hover:underline">Deck Cloud</a></span>],
            ]}
          />
          <DocNavFooter page="configuration" />
        </article>
      );
    }

    // ──────────────────────────────────────── page: deck-cloud ───
    function DeckCloudDocs() {
      return (
        <article className="max-w-[720px]">
          <p className="mb-2 font-mono text-[11px] font-semibold uppercase tracking-[0.14em] text-indigo-600">Deck Cloud</p>
          <DocH1>Deck Cloud</DocH1>
          <DocP><strong>One operations dashboard for every Laravel app — without replacing Horizon or moving your queues.</strong> Horizon and Redis stay on your infrastructure. The <C>deck/deck</C> package is the agent; Deck Cloud is where operators manage many services from one place.</DocP>

          <DocH2 id="what-you-get">What you get</DocH2>
          <DocTable
            headers={["On each app (self-hosted)", "On Deck Cloud (hosted)"]}
            rows={[
              [<span><C>/deck</C> for local history and incidents</span>, "One URL for every project and environment"],
              ["Horizon for workers and throughput", "Worker snapshots and queue workload"],
              ["Cancel/block flags in your Redis", "Remote commands — cancel, block, drain"],
              ["Per-app alerts and search", "Cross-app signals (roadmap)"],
            ]}
          />

          <DocH2 id="how-it-works">How it works</DocH2>
          <DocCb title="">{`  billing-api (prod) ──┐
  billing-api (staging)├──► Deck Cloud  ◄── you
  notifications (prod)─┘         ▲
                                 │ HTTPS (API key)
  Each app: deck/deck ───────────┘   workers · commands · events
  Each app: Horizon / Redis (unchanged)`}</DocCb>
          <ol className="my-4 space-y-3">
            {[
              <span key="1">Install <C>deck/deck</C> in each Laravel app.</span>,
              <span key="2">Set stable <C>DECK_PROJECT</C> and <C>DECK_ENVIRONMENT</C> per deployable.</span>,
              <span key="3">Add a <strong>Deck Cloud API key</strong> — the agent enables automatically.</span>,
              "Open Cloud, filter by project and environment, and act on queues from one place.",
            ].map((item, i) => (
              <li key={i} className="flex items-start gap-3 text-[14px] leading-[1.65] text-zinc-600">
                <span className="flex size-5 shrink-0 items-center justify-center rounded-full bg-indigo-600 font-mono text-[11px] font-semibold text-white">{i + 1}</span>
                <span className="mt-0.5">{item}</span>
              </li>
            ))}
          </ol>
          <DocP>The in-app dashboard shows a <strong>Cloud connection</strong> indicator when linked. Remote commands use the same primitives as local operations: cooperative cancel, block class, cancel pending, and more.</DocP>

          <DocH2 id="connect">Connect an app</DocH2>
          <DocCb title=".env">{`DECK_PROJECT=billing-api
DECK_ENVIRONMENT=production
DECK_API_KEY=your-agent-token`}</DocCb>
          <DocP>Those three variables are sufficient to enable worker ingest, command polling, and execution event sync.</DocP>

          <DocH2 id="cloud-vars">Environment variables</DocH2>
          <DocTable
            headers={["Variable", "Default", "Purpose"]}
            rows={[
              [<C>DECK_API_KEY</C>, "—", "Agent token; enables Cloud when set"],
              [<C>DECK_CLOUD_URL</C>, "https://deckapp.cloud", "Cloud base URL"],
              [<C>DECK_CLOUD_ENABLED</C>, "auto", <span>Set <C>false</C> to disable while keeping the key</span>],
              [<C>DECK_CLOUD_WORKERS_ENABLED</C>, "true", "Push worker snapshots"],
              [<C>DECK_CLOUD_WORKERS_INTERVAL</C>, "30", "Sync throttle in seconds"],
              [<C>DECK_CLOUD_COMMANDS_ENABLED</C>, "true", "Pull remote commands"],
              [<C>DECK_CLOUD_EVENTS_ENABLED</C>, "true", "Push execution events"],
              [<C>DECK_CLOUD_EVENTS_BATCH_SIZE</C>, "25", "Event batch size (1–100)"],
              [<C>DECK_CLOUD_PROMO</C>, "true", "Sidebar link to deckapp.cloud when Cloud is off"],
            ]}
          />
          <DocNote>Set <C>DECK_CLOUD_ENABLED=false</C> to disable the agent without removing the API key.</DocNote>

          <DocH2 id="agent-api">Agent API</DocH2>
          <DocP>When enabled, the agent communicates with Deck Cloud via four endpoints:</DocP>
          <DocTable
            headers={["Method", "Endpoint", "Purpose"]}
            rows={[
              ["POST", "/api/v1/ingest/workers", "Worker snapshots + optional queue workload (max 100 workers)"],
              ["GET", "/api/v1/agent/commands", "Pull commands for this project + environment"],
              ["POST", "/api/v1/agent/commands/ack", "Acknowledge command results"],
              ["POST", "/api/v1/ingest/events", "Batched execution events (max 100 per request)"],
            ]}
          />
          <DocP>Sync runs on Horizon <C>MasterSupervisorLooped</C>, throttled <C>Queue::looping</C>, and <C>deck:report-workers</C>. Remote commands map to <C>requestCancelExecution</C>, <C>forceCancelExecution</C>, <C>cancelPending</C>, <C>blockClass</C>, <C>unblockClass</C>, and <C>cancelAllRunningForClass</C>.</DocP>
          <DocNavFooter page="deck-cloud" />
        </article>
      );
    }

    // ──────────────────────────────────────── docs layout ────────
    function DocsLayout({ page }) {
      const pages = {
        'getting-started': <DocsGettingStarted />,
        'usage':           <DocsUsage />,
        'production':      <DocsProduction />,
        'configuration':   <DocsConfiguration />,
        'deck-cloud':      <DeckCloudDocs />,
        'horizon':         <DocsHorizon />,
      };
      const content = pages[page] || pages['getting-started'];
      return (
        <div className="mx-auto max-w-[1200px] px-6 py-10 lg:py-14">
          <div className="lg:flex lg:gap-14">
            <DocsSidebar page={page} />
            <div className="min-w-0 flex-1">
              <DocsMobileNav page={page} />
              {content}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────── app ─────────
    function App() {
      const docPage = useDocPage();
      useEffect(() => {
        document.title = docPage !== null
          ? `${DOCS_FLAT.find(p => p.id === docPage)?.label ?? 'Documentation'} — Deck docs`
          : 'Deck — Job-class observability for Laravel';
      }, [docPage]);
      if (docPage !== null) {
        return (
          <>
            <Nav/>
            <DocsLayout page={docPage}/>
            <Footer/>
          </>
        );
      }
      return (
        <>
          <Nav/>
          <Hero/>
          <Comparison/>
          <Features/>
          <CodeSection/>
          <Pricing/>
          <WaitlistCTA/>
          <Footer/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
